<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users | ESX Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-BmbxuPwQa2lc/FVzBcNJ7UAyJxM6wuqIj61tLrc4wSX0szH/Ev+nYRRuWlolflfl" crossorigin="anonymous">
    <link rel="stylesheet" href="/admin/css/common.css">
    <link rel="stylesheet" href="/admin/css/users.css">
    <link rel="prefetch" href="/admin">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid" style="user-select: none;">
            <a class="navbar-brand">ESX Manager</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link" style="color: gray !important" aria-current="page" href="/admin">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active">Ban & Warns</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div id="main" class="container-bg">
        <!-- TOAST MESSAGE BOTTOM RIGHT -->
        <div class="position-fixed bottom-0 end-0 p-3" style="z-index: 5">
            <div class="toast-container">
                <div v-for="toast in toasts" class="toast fade" v-bind:class="toast.show ? 'show' : ''" role="alert" aria-live="assertive" aria-atomic="true">
                    <div class="toast-body">{{ toast.message }}</div>
                </div>
            </div>
        </div>
        <div class="container">
            <!-- BAN LIST -->
            <div class="row justify-content-md-center">
                <div class="col-sm-12 shadow bg-dark rounded">
                    <div class="mt-2 d-flex">
                        <h3 class="col-sm-10">Ban List</h3>
                        <button class="m-1 btn btn-success btn-sm" type="button" v-on:click="unbanAll()">Unban all</button>
                    </div>
                    <table class="table">
                        <thead>
                            <tr>
                                <th scope="col">Name</th>
                                <th scope="col">Identifier</th>
                                <th scope="col">Reason</th>
                                <th scope="col">
                                    <div class="input-group flex-nowrap" style="max-width: 60%;">
                                        <span class="input-group-text black-im" id="addon-wrapping">Filter</span>
                                        <input type="text" class="form-control black-im" placeholder="Username" aria-label="Username" aria-describedby="addon-wrapping" ref="filter" @input="$forceUpdate()">
                                    </div>
                                </th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr v-for="(value, index) in banned" v-if="value.name.includes($refs.filter ? $refs.filter.value : '')">
                                <th scope="row">{{ value.name }}</th>
                                <td>{{ value.identifier }}</td>
                                <td>{{ value.reason }}</td>
                                <td>
                                    <button class="btn btn-danger btn-sm" type="button" v-on:click="unban(index)">Unban</button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
            <!-- WARN LIST -->
            <div class="row justify-content-md-center">
                <div class="col-sm-12 shadow bg-dark rounded">
                    <div class="mt-2 d-flex">
                        <h3 class="col-sm-10">Warnings List</h3>
                    </div>
                    <table class="table">
                        <thead>
                            <tr>
                                <th scope="col">ID</th>
                                <th scope="col">Date</th>
                                <th scope="col">Name</th>
                                <th scope="col">Identifier</th>
                                <th scope="col">Reason</th>
                                <th scope="col">
                                    <div class="input-group flex-nowrap" style="max-width: 80%;">
                                        <span class="input-group-text black-im" id="addon-wrapping">Filter</span>
                                        <input type="text" class="form-control black-im" placeholder="Username" aria-label="Username" aria-describedby="addon-wrapping" ref="filter" @input="$forceUpdate()">
                                    </div>
                                </th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr v-for="(value, index) in warns">
                                <th scope="row">{{ value.id }}</th>
                                <td>{{ value.date }}</td>
                                <td>{{ value.name }}</td>
                                <td>{{ value.warned }}</td>
                                <td v-if="!value.editing">{{ value.reason }}</td>
                                <td v-else>
                                    <div class="form-floating">
                                        <textarea v-bind:ref="'warn_' + index.toString()" style="min-height: 58px; min-width: 440px;" class="form-control black-im" placeholder="Reason" id="floatingTextarea" v-model="value.reason"></textarea>
                                        <label for="floatingTextarea" style="color: grey !important;">Edit reason</label>
                                    </div>
                                </td>
                                <td>
                                    <button class="btn btn-danger btn-sm" type="button" v-on:click="removeWarn(index)">Remove</button>
                                    <button class="btn btn-primary btn-sm" type="button" v-on:click="editWarn(index)">Edit</button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta2/dist/js/bootstrap.bundle.min.js" integrity="sha384-b5kHyXgcpbZJO/tY9Ul7kGkf1S0CWuKcCD38l8YkeH8z8QjE0GmW1gYU5S9FOnJ0" crossorigin="anonymous"></script>
    <script src="/admin/js/vue.min.js"></script>
    <script src="/admin/js/users.js"></script>
</body>
</html>
